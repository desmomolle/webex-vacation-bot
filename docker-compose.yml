services:
  webex-vacation-bot:
    image: ghcr.io/desmomolle/webex-vacation-bot:latest
    container_name: webex-vacation-bot
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - ./data:/data
    # Everything is configured in the browser wizard at http://<host>:8080/setup.
    # Optional overrides (otherwise set them in the wizard):
    # environment:
    #   SETUP_PASSWORD: "your-login-password"   # otherwise auto-generated (see logs)
    #   MY_WEBEX_EMAIL: "you@example.com"        # your own address (to skip your own messages)
