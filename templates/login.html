<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webex Vacation Bot – Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { accent: {
        50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',500:'#6366f1',600:'#4f46e5',700:'#4338ca'
      } } } }
    }
  </script>
  <style> body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <div class="flex items-center justify-center gap-3 mb-6">
      <div class="w-9 h-9 bg-accent-600 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
      </div>
      <h1 class="text-lg font-semibold text-gray-900 tracking-tight">Webex Vacation Bot</h1>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">Anmelden</h2>

      {% if error %}
      <div class="mb-4 px-3 py-2 rounded-lg bg-red-50 border border-red-200 text-sm text-red-600">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <input type="hidden" name="next" value="{{ next }}" />
        <div>
          <label class="block text-xs text-gray-500 uppercase tracking-wide font-medium mb-1" for="password">Passwort</label>
          <input id="password" name="password" type="password" autofocus required
            class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 outline-none text-sm" />
        </div>
        <button type="submit"
          class="w-full px-3 py-2 rounded-lg text-sm font-medium bg-accent-600 text-white hover:bg-accent-700 transition-colors">
          Einloggen
        </button>
      </form>

      <p class="mt-4 text-xs text-gray-400 leading-relaxed">
        Das Passwort steht beim ersten Start in den Logs
        (<span class="font-mono">ACCESS PASSWORD</span>) oder ist in der
        <span class="font-mono">.env</span> als <span class="font-mono">SETUP_PASSWORD</span> gesetzt.
      </p>
    </div>
  </div>

</body>
</html>
